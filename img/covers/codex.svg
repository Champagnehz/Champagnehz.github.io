<svg viewBox="0 0 800 400" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#f0f9ff;stop-opacity:1" />
      <stop offset="50%" style="stop-color:#e0f2fe;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#bae6fd;stop-opacity:1" />
    </linearGradient>
    <radialGradient id="sunGrad" cx="30%" cy="30%" r="60%">
      <stop offset="0%" style="stop-color:#fbbf24;stop-opacity:0.3" />
      <stop offset="100%" style="stop-color:#fbbf24;stop-opacity:0" />
    </radialGradient>
    <linearGradient id="textGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#0284c7;stop-opacity:1" />
      <stop offset="50%" style="stop-color:#0891b2;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#059669;stop-opacity:1" />
    </linearGradient>
    <filter id="softShadow">
      <feDropShadow dx="0" dy="2" stdDeviation="3" flood-opacity="0.1"/>
    </filter>
    <filter id="glow">
      <feDropShadow dx="0" dy="0" stdDeviation="2" flood-color="#60a5fa" flood-opacity="0.3"/>
    </filter>
  </defs>
  
  <!-- Background -->
  <rect width="800" height="400" fill="url(#bg)"/>
  
  <!-- Sunlight effect -->
  <ellipse cx="240" cy="120" rx="300" ry="200" fill="url(#sunGrad)"/>
  
  <!-- Light geometric patterns -->
  <g opacity="0.15">
    <circle cx="150" cy="100" r="80" fill="none" stroke="#0ea5e9" stroke-width="1"/>
    <circle cx="150" cy="100" r="120" fill="none" stroke="#0ea5e9" stroke-width="0.5"/>
    <circle cx="650" cy="300" r="100" fill="none" stroke="#06b6d4" stroke-width="1"/>
    <circle cx="650" cy="300" r="140" fill="none" stroke="#06b6d4" stroke-width="0.5"/>
  </g>
  
  <!-- Clean terminal window -->
  <g transform="translate(200, 140)" filter="url(#softShadow)">
    <!-- Terminal frame -->
    <rect x="0" y="0" width="400" height="120" rx="8" fill="white" stroke="#e2e8f0" stroke-width="1"/>
    
    <!-- Terminal header -->
    <rect x="0" y="0" width="400" height="30" rx="8" fill="#f8fafc"/>
    <rect x="0" y="20" width="400" height="10" fill="#f8fafc"/>
    
    <!-- Window controls -->
    <circle cx="20" cy="15" r="4" fill="#ef4444"/>
    <circle cx="35" cy="15" r="4" fill="#f59e0b"/>
    <circle cx="50" cy="15" r="4" fill="#10b981"/>
    
    <!-- Terminal content -->
    <g font-family="'SF Mono', 'Monaco', 'Inconsolata', monospace" font-size="12">
      <!-- Prompt line -->
      <text x="15" y="45" fill="#0284c7" font-weight="500">$ codex --init</text>
      
      <!-- Output lines -->
      <text x="15" y="62" fill="#64748b">Initializing AI workspace...</text>
      <text x="15" y="77" fill="#64748b">Model: GPT-4 Turbo</text>
      <text x="15" y="92" fill="#64748b">Sandbox: workspace-write</text>
      <text x="15" y="107" fill="#10b981" font-weight="500">✓ Ready for development</text>
    </g>
  </g>
  
  <!-- Floating command bubbles -->
  <g>
    <g transform="translate(80, 120)">
      <rect x="0" y="0" width="60" height="24" rx="12" fill="#dbeafe" stroke="#60a5fa" stroke-width="1"/>
      <text x="30" y="16" text-anchor="middle" fill="#1e40af" font-family="'SF Mono', monospace" font-size="10" font-weight="500">/model</text>
    </g>
    
    <g transform="translate(660, 130)">
      <rect x="0" y="0" width="60" height="24" rx="12" fill="#d1fae5" stroke="#10b981" stroke-width="1"/>
      <text x="30" y="16" text-anchor="middle" fill="#065f46" font-family="'SF Mono', monospace" font-size="10" font-weight="500">/status</text>
    </g>
    
    <g transform="translate(100, 300)">
      <rect x="0" y="0" width="50" height="24" rx="12" fill="#fed7aa" stroke="#f59e0b" stroke-width="1"/>
      <text x="25" y="16" text-anchor="middle" fill="#92400e" font-family="'SF Mono', monospace" font-size="10" font-weight="500">/plan</text>
    </g>
    
    <g transform="translate(650, 310)">
      <rect x="0" y="0" width="60" height="24" rx="12" fill="#e9d5ff" stroke="#a78bfa" stroke-width="1"/>
      <text x="30" y="16" text-anchor="middle" fill="#6b21a8" font-family="'SF Mono', monospace" font-size="10" font-weight="500">/review</text>
    </g>
  </g>
  
  <!-- Code brackets with light style -->
  <g opacity="0.3" font-family="'SF Mono', monospace" font-size="24" fill="#0ea5e9">
    <text x="60" y="80">{</text>
    <text x="720" y="80">}</text>
    <text x="60" y="320">[</text>
    <text x="720" y="320">]</text>
  </g>
  
  <!-- Main title -->
  <text x="400" y="50" text-anchor="middle" fill="url(#textGrad)" font-family="'Inter', system-ui, sans-serif" font-size="40" font-weight="700">CODEX</text>
  
  <!-- Subtitle -->
  <text x="400" y="80" text-anchor="middle" fill="#64748b" font-family="'Inter', system-ui, sans-serif" font-size="14">AI-Powered Command Line Interface</text>
  
  <!-- Feature pills with light style -->
  <g transform="translate(180, 330)">
    <rect x="0" y="0" width="80" height="24" rx="12" fill="#f0f9ff" stroke="#0ea5e9" stroke-width="1"/>
    <text x="40" y="16" text-anchor="middle" fill="#0c4a6e" font-family="'Inter', sans-serif" font-size="10" font-weight="500">AI ASSIST</text>
  </g>
  
  <g transform="translate(280, 330)">
    <rect x="0" y="0" width="80" height="24" rx="12" fill="#f0fdfa" stroke="#10b981" stroke-width="1"/>
    <text x="40" y="16" text-anchor="middle" fill="#064e3b" font-family="'Inter', sans-serif" font-size="10" font-weight="500">CLI TOOL</text>
  </g>
  
  <g transform="translate(380, 330)">
    <rect x="0" y="0" width="80" height="24" rx="12" fill="#faf5ff" stroke="#a78bfa" stroke-width="1"/>
    <text x="40" y="16" text-anchor="middle" fill="#581c87" font-family="'Inter', sans-serif" font-size="10" font-weight="500">SESSION</text>
  </g>
  
  <g transform="translate(480, 330)">
    <rect x="0" y="0" width="80" height="24" rx="12" fill="#fff7ed" stroke="#f59e0b" stroke-width="1"/>
    <text x="40" y="16" text-anchor="middle" fill="#78350f" font-family="'Inter', sans-serif" font-size="10" font-weight="500">REVIEW</text>
  </g>
  
  <!-- Side command panels with light style -->
  <g transform="translate(50, 160)" filter="url(#softShadow)">
    <rect x="0" y="0" width="100" height="80" rx="6" fill="white" stroke="#e2e8f0" stroke-width="1"/>
    <g font-family="'SF Mono', monospace" font-size="9" fill="#475569">
      <text x="8" y="18">--model</text>
      <text x="8" y="32">--cd</text>
      <text x="8" y="46">--sandbox</text>
      <text x="8" y="60">--oss</text>
      <text x="8" y="74">--help</text>
    </g>
  </g>
  
  <g transform="translate(650, 160)" filter="url(#softShadow)">
    <rect x="0" y="0" width="100" height="80" rx="6" fill="white" stroke="#e2e8f0" stroke-width="1"/>
    <g font-family="'SF Mono', monospace" font-size="9" fill="#475569">
      <text x="8" y="18">/model</text>
      <text x="8" y="32">/status</text>
      <text x="8" y="46">/plan</text>
      <text x="8" y="60">/review</text>
      <text x="8" y="74">/init</text>
    </g>
  </g>
  
  <!-- Light decorative elements -->
  <g opacity="0.4">
    <circle cx="250" cy="100" r="2" fill="#fbbf24"/>
    <circle cx="550" cy="110" r="2" fill="#60a5fa"/>
    <circle cx="300" cy="290" r="2" fill="#a78bfa"/>
    <circle cx="500" cy="285" r="2" fill="#f59e0b"/>
    <circle cx="180" cy="250" r="1.5" fill="#10b981"/>
    <circle cx="620" cy="260" r="1.5" fill="#ef4444"/>
  </g>
  
  <!-- Light rays -->
  <g opacity="0.1">
    <path d="M200 50 L250 150" stroke="#fbbf24" stroke-width="2"/>
    <path d="M220 40 L270 140" stroke="#fbbf24" stroke-width="1"/>
    <path d="M180 60 L230 160" stroke="#fbbf24" stroke-width="1"/>
  </g>
</svg>
